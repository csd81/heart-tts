  function makeStub() {
    var TCF_LOCATOR_NAME = '__tcfapiLocator';
    var queue = [];
    var win = window;
    var cmpFrame;

    function addFrame() {
      var doc = win.document;
      var otherCMP = !!(win.frames[TCF_LOCATOR_NAME]);

      if (!otherCMP) {
        if (doc.body) {
          var iframe = doc.createElement('iframe');

          iframe.style.cssText = 'display:none';
          iframe.name = TCF_LOCATOR_NAME;
          doc.body.appendChild(iframe);
        } else {
          setTimeout(addFrame, 5);
        }
      }
      return !otherCMP;
    }

    function tcfAPIHandler() {
      var gdprApplies;
      var args = arguments;

      if (!args.length) {
        return queue;
      } else if (args[0] === 'setGdprApplies') {
        if (
          args.length > 3 &&
          args[2] === 2 &&
          typeof args[3] === 'boolean'
        ) {
          gdprApplies = args[3];
          if (typeof args[2] === 'function') {
            args[2]('set', true);
          }
        }
      } else if (args[0] === 'ping') {
        var retr = {
          gdprApplies: gdprApplies,
          cmpLoaded: false,
          cmpStatus: 'stub'
        };

        if (typeof args[2] === 'function') {
          args[2](retr);
        }
      } else {
        if(args[0] === 'init' && typeof args[3] === 'object') {
          args[3] = Object.assign(args[3], { tag_version: 'V3' });
        }
        queue.push(args);
      }
    }

    function postMessageEventHandler(event) {
      var msgIsString = typeof event.data === 'string';
      var json = {};

      try {
        if (msgIsString) {
          json = JSON.parse(event.data);
        } else {
          json = event.data;
        }
      } catch (ignore) {}

      var payload = json.__tcfapiCall;

      if (payload) {
        window.__tcfapi(
          payload.command,
          payload.version,
          function(retValue, success) {
            var returnMsg = {
              __tcfapiReturn: {
                returnValue: retValue,
                success: success,
                callId: payload.callId
              }
            };
            if (msgIsString) {
              returnMsg = JSON.stringify(returnMsg);
            }
            if (event && event.source && event.source.postMessage) {
              event.source.postMessage(returnMsg, '*');
            }
          },
          payload.parameter
        );
      }
    }

    while (win) {
      try {
        if (win.frames[TCF_LOCATOR_NAME]) {
          cmpFrame = win;
          break;
        }
      } catch (ignore) {}

      if (win === window.top) {
        break;
      }
      win = win.parent;
    }
    if (!cmpFrame) {
      addFrame();
      win.__tcfapi = tcfAPIHandler;
      win.addEventListener('message', postMessageEventHandler, false);
    }
  }

  makeStub();

  var uspStubFunction = function() {
    var arg = arguments;
    if (typeof window.__uspapi !== uspStubFunction) {
      setTimeout(function() {
        if (typeof window.__uspapi !== 'undefined') {
          window.__uspapi.apply(window.__uspapi, arg);
        }

  };

if (typeof window.__gpp !== "function") {

function handleConsent(consentType) {
	_satellite.cookie.set(CMP_CONSENT_COOKIE, 'true', { domain: DOMAIN });

		if ((google)) { _satellite.track('googleBase'); }

}


// Function to handle CCPA consent
function handleCCPAConsent() {
    window.__uspapi('getUSPData', 1, function (uspData, success) {
        if (success) {
            if (uspData.uspString[2] === 'Y') {
                _satellite.logger.info("User Opted-Out with CCPA consent, Don't fire Inbound Scripts --> ", uspData.uspString[2]);
            } else {
                _satellite.logger.info("CCPA consent taken --> ", uspData.uspString[2]);
                handleConsent('CCPA');
            }
        } else {
            _satellite.logger.info("USP CMP call failed");
        }
    });
}

// Function to handle GDPR consent
function handleGDPRConsent() {
    window.__tcfapi('addEventListener', 2, function(tcData, success) {
        if (success) {
            if (tcData.gdprApplies) {
                if (tcData.eventStatus === 'tcloaded' || tcData.eventStatus === 'useractioncomplete') {
                    const consentResult = [1, 2, 3, 4, 5].every(i => tcData.purpose.consents[i]);
                    const liResult = tcData.purpose.legitimateInterests[2] && tcData.purpose.legitimateInterests[10];

                    if (consentResult && liResult) {
                        _satellite.logger.info("GDPR consent fully granted --> ", consentResult);
                        // --- Guard to prevent double firing ---
                        if (!gdprConsentFired) {
                            gdprConsentFired = true;
                            handleConsent('GDPR');
                        }
                    } else {
                        _satellite.logger.info("GDPR consent not fully granted");
                    }
                } else {
                    _satellite.logger.info("TCF CMP did not load correctly or user action incomplete");
                }
            } else {
                _satellite.logger.info("TCF consent reached - GDPR does not apply - Consent Not Needed");
                // --- Guard to prevent double firing ---
                if (!nonGdprConsentFired) {
                    nonGdprConsentFired = true;
                    handleConsent('Non-GDPR');
                }
            }
        } else {
            _satellite.logger.info("TCF CMP call failed");
        }
    });
}

// Main function to handle consent management
async function handleConsentManagement() {
    if (isInUS) {
        handleCCPAConsent();
    } else {
        handleGDPRConsent();
    }
}

// Initiate consent management
handleConsentManagement();
