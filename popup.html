<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 250px; padding: 12px; font-family: sans-serif; }
    .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    select, input[type="range"] { flex: 1; padding: 5px; cursor: pointer; }
    button { 
      padding: 6px 12px; 
      background: #4285f4; 
      color: white; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #357ae8; }
    .label { width: 50px; font-size: 12px; font-weight: bold; }
  </style>
</head>
<body>
  <div style="margin-bottom: 12px; font-weight: bold;">TTS Settings</div>
  
  <div class="row">
    <div class="label">Model:</div>
    <select id="modelSelect"><option>Loading...</option></select>
  </div>

  <div class="row">
    <div class="label">Voice:</div>
    <select id="voiceSelect"><option>Loading...</option></select>
  </div>
  
  <div class="row">
    <div class="label">Speed:</div>
    <input type="range" id="speedRange" min="0.5" max="2.0" step="0.1" value="1.0">
    <span id="speedValue" style="width: 24px; font-size: 12px; text-align: right;">1.0</span>
  </div>
  
  <div class="row" style="margin-top: 16px;">
    <button id="playSample" style="flex: 1;">TEST VOICE</button>
  </div>
  <div class="row">
    <button id="readPage" style="flex: 1; background: #34a853;">READ PAGE</button>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
