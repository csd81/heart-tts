i<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 250px; padding: 12px; font-family: sans-serif; }
    .row { display: flex; gap: 8px; align-items: center; }
    select { flex: 1; padding: 5px; cursor: pointer; }
    button { 
      padding: 6px 12px; 
      background: #4285f4; 
      color: white; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #357ae8; }
  </style>
</head>
<body>
  <div style="margin-bottom: 8px; font-weight: bold;">Voice Settings</div>
    <div style="flex: 2; display: flex; flex-direction: column;">
      <select id="voiceSelect" style="width: 100%;">
        <option value="af_alloy">Alloy (Female)</option>
        <option value="af_aoede">Aoede (Female)</option>
        <option value="af_bella">Bella (Female)</option>
        <option value="af_heart">Heart (Female)</option>
        <option value="af_jessica">Jessica (Female)</option>
        <option value="af_kore">Kore (Female)</option>
        <option value="af_nicole">Nicole (Female)</option>
        <option value="af_nova">Nova (Female)</option>
        <option value="af_river">River (Female)</option>
        <option value="af_sarah">Sarah (Female)</option>
        <option value="af_sky">Sky (Female)</option>
        <option value="am_adam">Adam (Male)</option>
        <option value="am_echo">Echo (Male)</option>
        <option value="am_eric">Eric (Male)</option>
        <option value="am_fenrir">Fenrir (Male)</option>
        <option value="am_liam">Liam (Male)</option>
        <option value="am_michael">Michael (Male)</option>
        <option value="am_onyx">Onyx (Male)</option>
        <option value="am_puck">Puck (Male)</option>
        <option value="am_santa">Santa (Male)</option>
        <option value="bf_alice">Alice (British F)</option>
        <option value="bf_emma">Emma (British F)</option>
        <option value="bf_isabella">Isabella (British F)</option>
        <option value="bf_lily">Lily (British F)</option>
        <option value="bm_daniel">Daniel (British M)</option>
        <option value="bm_fable">Fable (British M)</option>
        <option value="bm_george">George (British M)</option>
        <option value="bm_lewis">Lewis (British M)</option>
      </select>
      <div style="display: flex; align-items: center; margin-top: 4px; font-size: 12px;">
         <span style="margin-right: 4px;">Speed:</span>
         <input type="range" id="speedRange" min="0.5" max="2.0" step="0.1" value="1.2" style="flex: 1;">
         <span id="speedValue" style="margin-left: 4px; width: 24px;">1.2</span>
      </div>
    </div>
    <button id="playSample">PLAY</button>
  </div>
  <div class="row" style="margin-top: 8px;">
    <button id="readPage" style="width: 100%; background: #34a853;">READ PAGE</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
